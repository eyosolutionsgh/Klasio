# Klasio pre-live — the school stack and the vendor licensing portal on one box.
#
# Runtime layout on the server (/opt/klasio):
#   docker-compose.yml   (this file, copied from repo/ops/deploy/)
#   Caddyfile            (copied from repo/ops/deploy/)
#   .env                 (secrets — generated on the box, NEVER committed)
#   repo/                (the monorepo, rsync'd by the deploy workflow)
#   licence/             (the school box's own licence file, dropped in by hand)
#   vendor-keys/         (the licence SIGNING key — see the vendor service below)
#
# Only Caddy is published to the host. Both databases, Redis and all three apps stay on internal
# networks and are never reachable from outside.
#
# NOTE ON CO-TENANCY. docs/03-architecture.md separates the vendor portal from any school's box,
# and this file deliberately bends that: it is a pre-live/demo host, not a school's production
# server. The separation is preserved where it costs nothing — two Postgres CONTAINERS with
# separate volumes and separate credentials, and two networks, so the school stack has no route
# to the vendor database at all. Do not copy this file onto a real school's server.
name: klasio

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
      WEB_DOMAIN: ${WEB_DOMAIN:?set WEB_DOMAIN in .env}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env}
      VENDOR_DOMAIN: ${VENDOR_DOMAIN:?set VENDOR_DOMAIN in .env}
      VENDOR_ALLOWED_IPS: ${VENDOR_ALLOWED_IPS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - vendor
    networks:
      - school
      - vendor

  # ---------------------------------------------------------------------------
  # School stack
  # ---------------------------------------------------------------------------

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: eyo
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: eyo_sms
      # Read by the init script to create the non-owner role the API connects as.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}
    volumes:
      - dbdata:/var/lib/postgresql/data
      # Runs once, at first boot, before anything can connect — which is what makes the GRANTs
      # inside the row-level-security migration find a role to grant to. See the script.
      - ./repo/ops/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eyo']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - school

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - school

  api:
    build:
      context: ./repo
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      # Owner connection: `prisma migrate deploy` and the handful of genuinely tenant-less reads.
      DATABASE_URL: postgresql://eyo:${DB_PASSWORD}@db:5432/eyo_sms
      # Runtime connection. MUST be the non-owner role, or every policy in the row-level-security
      # migration is inert and the database stops refusing a query that lost its where clause.
      APP_DATABASE_URL: postgresql://eyo_app:${APP_DB_PASSWORD}@db:5432/eyo_sms
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY in .env}
      PUBLIC_BASE_URL: https://${WEB_DOMAIN}
      # The vendor key every licence is verified against — the PUBLIC half of the pair the vendor
      # portal signs with. This image does not ship the development key, so without this the box
      # refuses every licence and runs on the free package.
      LICENCE_PUBLIC_KEY: ${LICENCE_PUBLIC_KEY:?set LICENCE_PUBLIC_KEY in .env}
      LICENCE_FILE: /data/licence/klasio.licence
      LICENCE_HEARTBEAT_URL: ${LICENCE_HEARTBEAT_URL:-}
      STORAGE_LOCAL_DIR: /data/storage
      # Messaging. Unset means the mock provider, which records a message as SENT and delivers
      # nothing — refused in production unless ALLOW_MOCK_* says otherwise on purpose.
      NALO_SMS_ENDPOINT: ${NALO_SMS_ENDPOINT:-}
      NALO_SMS_USERNAME: ${NALO_SMS_USERNAME:-}
      NALO_SMS_PASSWORD: ${NALO_SMS_PASSWORD:-}
      NALO_SMS_SOURCE: ${NALO_SMS_SOURCE:-}
      MAILERSEND_API_TOKEN: ${MAILERSEND_API_TOKEN:-}
      MAILERSEND_FROM_EMAIL: ${MAILERSEND_FROM_EMAIL:-}
      MAILERSEND_FROM_NAME: ${MAILERSEND_FROM_NAME:-Klasio}
      # WhatsApp is REPLY-ONLY (see common/whatsapp-window.ts). Absent here originally, which meant
      # a box could not use WhatsApp even with credentials in .env — and WhatsAppService refuses to
      # start in production without either these or ALLOW_MOCK_SMS, so the API restart-looped.
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      # Verifies Meta's inbound callbacks. Without it the webhook fails closed, because a forged
      # inbound message would force open the 24-hour reply window.
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      # One switch covers SMS and WhatsApp both. It does NOT downgrade SMS while Nalo is
      # configured — a configured provider always wins — so on this box it means WhatsApp replies
      # are recorded as sent and delivered to nobody, and SMS and email stay real.
      ALLOW_MOCK_SMS: ${ALLOW_MOCK_SMS:-false}
      ALLOW_MOCK_EMAIL: ${ALLOW_MOCK_EMAIL:-false}
      ALLOW_MOCK_PAYMENTS: ${ALLOW_MOCK_PAYMENTS:-false}
    volumes:
      - filedata:/data/storage
      - ./licence:/data/licence:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school

  web:
    build:
      context: ./repo
      dockerfile: apps/web/Dockerfile
      args:
        # Set by the deploy workflow to the commit being shipped. Version skew protection — a
        # client left on a previous build reloads instead of posting to a Server Function id that
        # no longer exists. Empty on a hand-run build, which turns the feature off.
        NEXT_DEPLOYMENT_ID: ${NEXT_DEPLOYMENT_ID:-}
    restart: unless-stopped
    environment:
      # Server-side only — apps/web/src/lib/api.ts runs in Server Components and route handlers,
      # so this is read at runtime and needs no build arg. Reaches the API over the internal
      # network, not back out through Caddy.
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    networks:
      - school

  # ---------------------------------------------------------------------------
  # Vendor licensing portal — its own database, its own network.
  # ---------------------------------------------------------------------------

  vendordb:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: eyo
      POSTGRES_PASSWORD: ${VENDOR_DB_PASSWORD:?set VENDOR_DB_PASSWORD in .env}
      POSTGRES_DB: eyo_vendor
    volumes:
      - vendordbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eyo -d eyo_vendor']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vendor

  vendor:
    build:
      context: ./repo
      dockerfile: apps/vendor/Dockerfile
      args:
        NEXT_DEPLOYMENT_ID: ${NEXT_DEPLOYMENT_ID:-}
    restart: unless-stopped
    environment:
      VENDOR_DATABASE_URL: postgresql://eyo:${VENDOR_DB_PASSWORD}@vendordb:5432/eyo_vendor
      VENDOR_SESSION_SECRET: ${VENDOR_SESSION_SECRET:?set VENDOR_SESSION_SECRET in .env}
      VENDOR_ENCRYPTION_KEY: ${VENDOR_ENCRYPTION_KEY:?set VENDOR_ENCRYPTION_KEY in .env}
      # The PRIVATE signing key, mounted read-only rather than baked into the image. Everything a
      # Klasio server will ever trust is signed with this — treat losing it as losing the product.
      VENDOR_SIGNING_KEY_PATH: /keys/signing-key.pem
      VENDOR_ADMIN_EMAIL: ${VENDOR_ADMIN_EMAIL:?set VENDOR_ADMIN_EMAIL in .env}
      VENDOR_ADMIN_NAME: ${VENDOR_ADMIN_NAME:-Klasio Admin}
      MAILERSEND_API_TOKEN: ${MAILERSEND_API_TOKEN:-}
      MAILERSEND_FROM_EMAIL: ${MAILERSEND_FROM_EMAIL:-}
      MAILERSEND_FROM_NAME: ${MAILERSEND_FROM_NAME:-Klasio}
      ALLOW_MOCK_EMAIL: ${ALLOW_MOCK_EMAIL:-false}
    volumes:
      - ./vendor-keys:/keys:ro
    depends_on:
      vendordb:
        condition: service_healthy
    networks:
      - vendor

networks:
  # Two networks, not one. The school stack has no route to vendordb, so a compromised school
  # container cannot read the licence records — the part of the separation worth keeping on a
  # co-tenanted box.
  school:
  vendor:

volumes:
  dbdata:
  vendordbdata:
  redisdata:
  filedata:
  caddy_data:
  caddy_config:
