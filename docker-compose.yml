# One school, one server — a school's own cloud VM or an on-prem box.
# One command boots the full stack: docker compose up -d
# The package tier comes from the vendor-signed licence (entitlement engine), never from a
# build variant. First boot lands on /setup to create the school and its owner.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: eyo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: eyo_sms
      # Read by the init script below to create the non-owner role the API connects as.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}
    volumes:
      - dbdata:/var/lib/postgresql/data
      # Runs once, at first boot, before anything can connect — which is what makes the GRANTs
      # inside the row-level-security migration find a role to grant to. See the script.
      - ./ops/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eyo']
      interval: 5s
      timeout: 5s
      retries: 10

  # Queue backend for webhook retries and payment status re-query (docs/04 §4.1).
  # Online payments are connectivity-dependent by nature (docs/03 §3.4) — an air-gapped
  # install simply never enqueues gateway work.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      # Owner connection: `prisma migrate deploy` and the handful of genuinely tenant-less reads
      # (sign-in, gateway webhooks). Policies do not apply to the owner.
      DATABASE_URL: postgresql://eyo:${DB_PASSWORD:-change-me}@db:5432/eyo_sms
      # Runtime connection. MUST be the non-owner role, or every policy in the row-level-security
      # migration is inert and the database stops refusing a query that lost its where clause.
      APP_DATABASE_URL: postgresql://eyo_app:${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}@db:5432/eyo_sms
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      # Encrypts every per-school secret at rest — gateway credentials today, social account
      # tokens too. 32 bytes, hex or base64: `openssl rand -hex 32`.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      # Files land on the mounted volume unless an S3 bucket is configured, so a LAN box
      # keeps working with no object store at all (docs/03 §3.1 shape 3).
      STORAGE_LOCAL_DIR: /data/storage
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-af-south-1}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - filedata:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    # Runs `prisma migrate deploy` before boot — the migration chain must always
    # apply cleanly on an empty database (docs/06 §6.3).
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  dbdata:
  redisdata:
  filedata:
