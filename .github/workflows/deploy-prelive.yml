name: Deploy pre-live (Hetzner)

# Builds ON the Hetzner box via a self-hosted runner, the same shape the DVLA IDP boxes use.
#   - pull_request      -> `build` validates the three images compile. Never touches the stack.
#   - push to main / manual -> `deploy` rebuilds and restarts, and rolls back to the last-good
#                          images if the health checks fail.
#
# CI (.github/workflows/ci.yml) stays on GitHub-hosted runners and is the correctness gate:
# migrations, drift, lint, typecheck, unit tests, E2E. This workflow only ships.
#
# It triggers on CI *completing* rather than on the push, because there is no cross-workflow
# `needs:` — two workflows both listening to the same push run concurrently, and a plain
# `on: push` here would deploy a commit whose tests are still running or already red.
# `workflow_dispatch` deliberately keeps no such gate, so a deploy can still be forced by hand.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prelive-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_DIR: /opt/klasio

jobs:
  # Merge signal only. Builds the images, never touches the running stack.
  #
  # The fork guard is not boilerplate. This runner is self-hosted on a box that holds the licence
  # SIGNING key, so a workflow triggered by a fork's pull request would run that fork's code next
  # to the one secret that underwrites every Klasio server in existence. GitHub will not send
  # repository secrets to a fork run, but the key here is a file on disk, not a secret — so the
  # only thing standing between a fork PR and it is this line. Do not relax it.
  build:
    name: build
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, klasio-prelive]
    steps:
      - uses: actions/checkout@v4

      # Sequentially, and never `docker compose build` in one shot. A CX23 is 2 vCPU / 4 GB, and
      # BuildKit builds compose services in parallel by default — two concurrent Next.js builds
      # will OOM the box. One at a time fits; the bootstrap script also adds swap as a backstop.
      - name: Build images (validation only — no deploy)
        run: |
          for app in api web vendor; do
            echo "::group::build $app"
            docker build -f "apps/$app/Dockerfile" -t "klasio-$app-ci:${{ github.sha }}" .
            echo "::endgroup::"
          done

      - name: Clean up CI images
        if: always()
        run: |
          for app in api web vendor; do
            docker rmi "klasio-$app-ci:${{ github.sha }}" 2>/dev/null || true
          done
          docker image prune -f

  deploy:
    name: deploy
    # A workflow_run fires on completion regardless of outcome, so the conclusion must be checked
    # explicitly — without this, a failed CI would deploy.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, klasio-prelive]
    steps:
      # A workflow_run checkout defaults to the default branch's HEAD, not the commit that was
      # tested. Pinning to head_sha is what makes "deploy exactly what CI went green on" true;
      # without it a push landing mid-run would ship untested code.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # --delete so a file deleted in git is deleted on the box. The excludes matter: .env holds
      # the box's secrets and is generated there, and licence/ + vendor-keys/ are key material
      # that must never come from a git checkout.
      - name: Sync source into the deploy dir
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude '.next/' \
            --exclude 'test-results/' \
            --exclude 'tsconfig.tsbuildinfo' \
            --exclude '.env' \
            --exclude '.env.*' \
            ./ "$DEPLOY_DIR/repo/"

      # The Caddyfile is copied too — unlike the DVLA box it holds no secret, only {$VARS}
      # resolved from .env at container start.
      - name: Sync compose and proxy config
        run: |
          cp ./ops/deploy/docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"
          cp ./ops/deploy/Caddyfile          "$DEPLOY_DIR/Caddyfile"

      - name: Capture current images (for rollback)
        id: prev
        working-directory: /opt/klasio
        run: |
          : > /tmp/klasio-rollback
          for svc in api web vendor; do
            CID=$(docker compose ps -q "$svc" 2>/dev/null || true)
            if [ -n "$CID" ]; then
              SHA=$(docker inspect --format '{{.Image}}'        "$CID")
              REF=$(docker inspect --format '{{.Config.Image}}' "$CID")
              echo "$svc $SHA $REF" >> /tmp/klasio-rollback
            fi
          done
          if [ -s /tmp/klasio-rollback ]; then
            echo "captured last-good images:"; cat /tmp/klasio-rollback
          else
            echo "no running containers yet (first deploy) — rollback unavailable"
          fi

      # Sequential, for the OOM reason above.
      #
      # NEXT_DEPLOYMENT_ID stamps both Next builds with the commit being shipped, so a browser
      # still holding the previous build reloads rather than posting to a Server Function id that
      # no longer exists. It has to be exported here rather than written to .env: compose reads
      # build args from the environment, and .env on the box is deliberately never rewritten by a
      # deploy.
      - name: Build images
        working-directory: /opt/klasio
        env:
          NEXT_DEPLOYMENT_ID: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "deployment id: $NEXT_DEPLOYMENT_ID"
          for svc in api web vendor; do
            echo "::group::build $svc"
            docker compose build "$svc"
            echo "::endgroup::"
          done

      # Migrations auto-apply: both the API and the vendor image run `prisma migrate deploy`
      # before their process starts.
      - name: Restart the stack
        working-directory: /opt/klasio
        run: docker compose up -d --no-build

      # Probed from inside the compose networks, not through the public domains. A first deploy
      # runs before DNS resolves and before Caddy has an certificate, and a health check that
      # fails on that would roll back a perfectly good release.
      #
      # /public/setup/state is the API probe on purpose: it is @Public and it counts schools, so
      # a 200 proves the app booted AND the database is reachable through the eyo_app role. A
      # port check would pass on a server that answers every request with a 500.
      - name: Health check (auto-rollback on failure)
        working-directory: /opt/klasio
        run: |
          probe() { # name network url accepted-codes
            for i in $(seq 1 40); do
              code=$(docker run --rm --network "$2" curlimages/curl:latest \
                       -s -o /dev/null -w '%{http_code}' --max-time 10 "$3" || true)
              case " $4 " in *" $code "*) echo "✅ $1 healthy ($code)"; return 0 ;; esac
              echo "waiting for $1... ($i: $code)"; sleep 3
            done
            echo "❌ $1 never became healthy"; return 1
          }

          ok=0
          probe api    klasio_school http://api:4000/public/setup/state '200'             || ok=1
          probe web    klasio_school http://web:3000/                   '200 302 307'     || ok=1
          probe vendor klasio_vendor http://vendor:3200/                '200 302 307'     || ok=1
          [ "$ok" = 0 ] && exit 0

          echo "--- rolling back to the last-good images ---"
          docker compose logs api web vendor --tail=60 || true
          if [ -s /tmp/klasio-rollback ]; then
            while read -r svc sha ref; do
              [ -n "$sha" ] && [ -n "$ref" ] && docker tag "$sha" "$ref" && echo "↩️ $svc -> $sha"
            done < /tmp/klasio-rollback
            docker compose up -d --no-build
            echo "rolled back; pre-live stays on the last-good version"
          else
            echo "no previous images captured — cannot roll back automatically"
          fi
          exit 1

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
